# Nginx: www.alipride.com/botich → البوت على 127.0.0.1:6001
# ضع في: /etc/nginx/sites-available/alipride-botich
# أو أضف الـ location داخل سيرفر alipride.com الموجود

# إذا عندك سيرفر موجود لـ www.alipride.com — أضف فقط بلوك location التالي داخله:

# location /botich {
#     proxy_pass http://127.0.0.1:6001/botich;
#     proxy_http_version 1.1;
#     proxy_set_header Host $host;
#     proxy_set_header X-Real-IP $remote_addr;
#     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#     proxy_set_header X-Forwarded-Proto $scheme;
#     proxy_read_timeout 60s;
# }

server {
    listen 443 ssl http2;
    server_name www.alipride.com alipride.com;

    # عدّل مسارات الشهادة إذا مختلفة
    ssl_certificate     /etc/letsencrypt/live/www.alipride.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.alipride.com/privkey.pem;

    location /botich {
        proxy_pass http://127.0.0.1:6001/botich;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

server {
    listen 80;
    server_name www.alipride.com alipride.com;
    return 301 https://www.alipride.com$request_uri;
}
